# Local dev datastores for TasteMap.
#   docker compose -f infra/docker-compose.yml up -d
# Then from backend/:  alembic upgrade head
#
# Defaults match backend/.env.example (DATABASE_URL / REDIS_URL).
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: tastemap
      POSTGRES_PASSWORD: tastemap
      POSTGRES_DB: tastemap
    ports:
      - "5432:5432"
    volumes:
      - tastemap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tastemap -d tastemap"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tastemap_pgdata:
